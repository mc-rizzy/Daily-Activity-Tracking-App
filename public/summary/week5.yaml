title: "Week 5: Exodus 23-40"
date: "Jun 20, 2026"
week: 5
description: "Moses"
overview: |
  The stuff that happens after Moses and the Israelites get out of Egypt
notes: |
  <h1>Exodus 23-25</h1>
  More laws about not giving false witness/testimony and treating others.
  The Lord says Israel is to have 3 feasts a year: 
  Feast of Unleavened Bread (they exit Egypt), Feast of First Fruits of Labor, Feast of Fruits of Labor.
  The Lord will send an angel before them to guard them and lead them to the place the Lord prepared.
  The Lord said obey the angel, and don't rebel for the angel will not pardon transgression and the name of the Lord is in the angel.
  The Lord says he will drive out their enemies little by little, and describes borders to which Israel will expand.
  And none of those who are driven out are to live with Israel, for they will make Israel sin.

  Moses read the Book of the Covenant to Israel, and Israel responded with one voice 
  saying "All that the Lord has spoken we will do, and we will be obedient!" and they even said it twice.
  Moses sprinkled some blood on the altar sacrafice and also on the people.
  He went up the mountain and stayed forty days and nights, and the Lord's presence was on the mountain seven days, in form of a cloud or mist.

  The Lord tells Moses to tell the sons of Israel to raise a contribution of precious metals and fabrics and other stuff, 
  from every man whose heart moves him.

  These are to be used to build the Ark of the Convenant, some sort of table, and some sort of lampstand, 
  all built with wood and convered in gold, and there were other complciated details and patterns that God showed to Moses.
  
  <h1>Exodus 26-28</h1>
  Instructions to build the tabernacle.
  There is also a lamp that is to be light continually.
  Then instructions for garments for Aaron to be a priest and be consecrated.

  <h1>Exodus 29-31</h1>
  Instructions for sacrafices and consecrating the priests.
  Sacrafices of bulls and rams and sprinkling of blood, and there shall be an altar continually burning sacrafice.

  There shall be an altar perpetually burning incense.
  When a census is taken, everyone shall give for himself a ransom to the Lord, which is half a shekel.
  The rich are not to pay more, and the poor are not to pay less.

  There are recipes for mixing a holy anointing oil and a most holy incense, and they are to be holy to Israel.
  Nobody is to mix it for themselves to use as perfume, or pour it on themselves, or else be cut off from their people.
  
  The sabbath is holy and a sign between the sons of Israel forever that YHWH is the one who sanctifies Israel. And the seventh day is holy to the Lord.
  Then when God finished speaking with Moses on Mount Sinai, he gave Moses two tablets of the testimony, tablets of stone, written by the finger of God.
  
  <h1>Exodus 32-34</h1>
  Israel is impatient and thinks Moses might have died. They came to Aaron and asked for an idol.
  Aaron gathered the gold earings from Israel and smelted it into a golden calf.

  They worshipped it and danced and stuff. God saw, and became angry whilst with Moses. God intended to kill all of Israel,
  but Moses pleaded with him and God "changed his mind" - more complex meaning in hebrew.
  Moses went down with the tablets written by God, and upon seeing the Israelites dancing and singing music over the idol, threw the
  tablets down and shattered them in a fit of rage.

  He gave Aaron a piece of his mind, then shouted all those who are for the Lord come follow. The sons of Levi came, and Moses instructed them
  to slaughter the Israelites. 3000 were slaughtered that day, and Moses melted the calf and made the Israelites drink the gold.

  Then he went back up the mountain in hopes of atoning for the Israelites. And Moses understood the severity of this sin, and was so ashamed he asked to be blotted out of God's book if he would not forgive them.
  God makes it clear he will give just punishment to those who have sinned against him, on the day of punishment.
  God also smote the the people.

  The Lord tells Moses that to resume the journey, Israel will be led by an angel because God is furious with Israel and might destroy them if his presence is there.
  Moses would take the tent of meeting far away from the Israel camp, where he would meet with God along with a few others, and the
  pillar of cloud would descend and meet Moses there.

  Moses negotiates with God and wants to see his glory. God grants Moses to be passed by him while his hand is covering Moses, and Moses can see God's back after he has passed.
  Moses goes back up Mount Sinai with 2 stone tablets for 40 days and nights without food or water.
  God renews the covenant and thus reiterates a bunch of traditions and certain laws he wants Israel to keep, and Moses comes back down the mountain with a shiny face and the 10 commandments on the tablets.
  
  <h1>Exodus 35-37</h1>
  Moses repeats the commands of the Lord to Israel, collected material and offering from those who had a willing heart,
  and assembled the skilled people, and Bzalel by name, to build the tabernacle and other things the Lord spoke of.

  Moses had to tell the people to stop giving offerings and materials because Moses already had more than enough for the building of the tabernacle.
  The rest of chapter 36 recocunts specific details about the building and measuring of parts of the tabernacle.

  Chapter 37 details Bezalel's work on the Ark of the Covenant and the alter of incense, amongst other things.
  Most of everything was covered or made of gold.
  
  <h1>Exodus 38-40</h1>
  More details about the creation of the utensils and table.
  Also how many sheckels and talents were collected and melted down for the material of bronze and silver.

  More details on the garments made for Aaron and the other priests.
  More information about how everything of the Tabernacle was arranged and prepared to be set up.
  Many things were annointed, and Aaron and his son-preists were also annointed, that they may be priests for God throughout the generations.

  Then the cloud covered the tent of meeting and the Lord filled it, and Moses was not able to enter it.
  Whenever the cloud sat on it, Israel would not journey.
  And when the cloud was taken up Israel would set out.
  