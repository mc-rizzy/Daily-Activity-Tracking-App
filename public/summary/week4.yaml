title: "Week 4: Exodus 5-22"
date: "Jun 13, 2026"
week: 4
description: "Moses"
overview: |
  Moses leads the Israelites out of Egypt
notes: |
  ===== Day 1 =====:
  Moses and Aaron ask Pharaoh to let Israelites go on a 3 day journey into the wilderness to worship and have a feast for God.
  Pharaoh says no and increases work for the Israelites, and beat them.
  Israelites get mad at Moses and Aaron.

  God tells Moses that Pharaoh will act under compulsion, and to press forward.
  More geneaologies.
  God says he will make Moses as God to Pharaoh and Aaron as prophet.

  God and Moses do the snake-to-staff miracle, and the water-to-blood miracle, and Pharaoh's magicians do the same.
  Pharaoh's heart is hardened and he has no concern.

  ===== Day 2 =====:
  God makes frogs appear all over Egypt. The magicians also make frogs. Pharaoh agrees to let Israelites go and asks Moses to remove the frogs.
  God removes the frogs, and Pharaoh goes back on his word.

  God makes gnats and flies go all over Egypt, but he set apart Goshen where his Israelites live, so there were no flies there.
  Pharaoh's magicians cannot copy this miracle, and admit it is the finger of God. Pharaoh agrees to let Israel go and asks Moses to remove the flies.
  Moses agrees, and God removes the flies, but Pharaoh goes back on his word.

  God makes a pestilence for livestock, all of Egypt's livestock die, but not one of Israel's livestock die.
  God casts boils all over Egypt and livestock.
  Moses warns Pharaoh that God will send hail, and all that stand in it will die. 
  Those servants who fear the Lord hid their servants and livestock.
  Hail, flashing fire, and thunder rain down on Egypt, but not Goshen.

  Pharaoh agrees to let the Israelites go, but when the hail stops, he goes back on his word.
  Moses warns of the locusts God will send.
  Pharaoh's servants beg him to let the Israelites go, for Egypt is destroyed.
  Pharaoh does not want to let all of Israel go, but only let the men go.

  God brings the locusts from the east. Pharaoh begs Moses to make them leave. 
  God retrieves the locusts the east, and Pharaoh goes back on his word.

  God brings a great darkness to the Land, but there is light in each dwelling of a son of Israel.
  Pharaoh agrees to let the Israelites go, but not their livestock with them.
  Moses refuses, and Pharaoh gets mad and says he will kill Moses if he sees him again.
  Moses says he will never see Pharaoh's face again.

  ===== Day 3 =====:
  The Lord tells Israelites to ask their Egyptian neighbors for silver and gold, and they do so and are given.
  The Lord warns Moses that the firstborn of Egypt will die, even of the livestock. And there will be a great cry,
  but the Lord makes a distinction between Israel and Egypt, so much so that not even a dog would dare bark at an Israelite.

  The Lord gives Moses specific instructions for the Passover: How each family shall take a lamb, 
  how they might split it amongst themselves or with their neighbors, when they are to kill it, how they are to smear the blood over their lintel and doorposts,
  how they are to be dressed, how they are to cook the lamb, how they are to eat it, how they are to discard of leftovers, how they are to eat afterwards for a certain duration,
  and how they are to remember, repeat, and celebrate on certain days of the certain month this rite after they enter the Promised Land. 
  And the punishment for diverging from the instructions are to be cut off from Israel.

  Then the Lord killed all the firstborns of Egypt, and the Egyptians urged the Israelites to leave, so the Israelites left
  in the night, having effectively plundered Egypt. And the Lord made rules for who may celebrate the Passover, that outsiders may
  eat and celebrate once they have become circumcised.

  The Lord says every firstborn must be sanctified to the Lord. The males belong to the Lord. 
  The firstborn must be redeemed with a lamb, or have its neck broken (representative of the firstborn of man and of beast).
  This is to be a sign on the hand and frontlets on the forehead.

  Moses takes Joseph's bones and God leads the Israelites into the wilderness to the Red Sea, in a pillar of cloud by day and of fire by night.

  ===== Day 4 =====:
  Pharaoh comes with an army of officers and chariots to pursue the Israelites as God forewarned.
  The people of Israel complain to Moses.

  The cloud pillar (that is God) and his angel of darkness (description is ambiguous) move from the front of Israel to the back,
  between the camp of Egypt and Israel. The cloud pillar becomes darkness to the Egyptians, but light to the Israelites.
  God uses Moses to part the sea, and the Israelites cross while pursued.

  Whilst the Egyptians are pursuing in the sea, the Lord confuses them and their chariots break and swerve.
  The Egyptians begin to flee, as they recognize the power of the Lord.
  The Lord resumes the sea, and wipes out Pharaoh and his army (they wash up on seashore).

  The Israelites sang a song to the Lord about utterly destroying their enemies.
  They came to Marah after 3 days without finding water. The water at Marah was bitter, and they complained to Moses.
  God showed Moses a tree, which he threw into the river, and the water became sweet.

  The Lord gave them a statute, that he will put none of the diseases he put on the Egyptians on Israel, if they do what is right
  and give heed to his commandments.

  Later the Israelites grumbled about hunger. Each day, the Lord provided quail in the evening (meat), dew in the morning, and manna afterwards.
  He instructed each to gather only what they will eat for the day, as he will provide. And no one shall store the food to the next day, except on the sixth day, 
  when each shall gather twice as much to store for the seventh day, the Sabbath. And no one was to go out and gather on the Sabbath.

  And people tried to store food to the next day, and also to gather food on the Sabbath, and the Lord was not pleased.
  And each family was to take a jar full of manna throughout the generations, that they may see the bread that the Lord
  fed Israel when bringing them out of Egypt, and it was so that Israel kept a jar of manna throughout the generations that was
  eaten until they reached the promised land.

  ===== Day 5 =====:
  The Israelites complained about thirst, and God told Moses to go strike a rock, where the Lord will be over, for water.
  Then Israel fought Amalek, and Moses stood nearby on a hill and held his arms up with the staff.
  As long as his arms were raised, Israel prevailed against Amalek. So Aaron and Hur supported his hands, and a stone was moved for Moses to sit on.
  And Joshua, in the battlefield, overwhelmed Amalek with the sword.
  And the Lord said He will utterly blot out the memory of Amalek from under heaven, and have war against Amalek from generation to generation.

  Jethro (father in law), Zipporah (wife) and two sons of Moses came to meet him (as previously they were sent away before the plagues for safety).
  They feasted and then Moses went to judge the disputes of the people.
  Jethro counseled Moses, saying he needs others to help bear the burden.
  Moses selected able men from Israel be judges for minor disputes at all times, and they shall bring major disputes to Moses.

  Israel came to the mountain at Sinai, where the Lord reiterated the covenant to Moses, saying He will make them his possesion if they follow his voice and keep the covenant.
  Israel was to consecrate themselves for three days, and nobody was to go beyond the bounds to the mountain or else they will be put to death.
  On the third day, the Lord descended to the top of the mountain in form of fire and smoke, and also spoke thunder.
  Moses went up to meet the Lord, and the Lord sent him back down to warn the people not to come up the mountain, and then return with Aaron.

  ===== Day 6 =====:
  God tells Moses the ten commandments and Moses relates to Israel.
  Moses relates more regulations and instructions for building an altar, freeing slaves, assault, murder, kidnapping,
  fetal and pregnant injury, all sorts of violence, irresponsibility, theft, breach of trust, adultery, lending money, borrowing,
  cursing God or a ruler of Israel, delaying offering from harvest, consecrating firstborns, eating flesh torn in the field,
  (following have death penalty)
  sorcery, bestiality (screwing animals), idolatry, wronging strangers

  Also apprently having a piercing in the ear is a symbol of being a permanent slave for life.
