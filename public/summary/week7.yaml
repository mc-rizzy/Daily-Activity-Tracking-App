title: "Week 7: Leviticus 19 - Numbers 9"
date: "Jun 30, 2026"
week: 7
description: "Year 2 of being in the wilderness"
overview: |
  More things to <i>not</i> do
notes: |
  <h1>Leviticus 19-21</h1>
  There is a symbolic theme of unity and focus that is reflected is various laws for the Israelites:
  You shall not breed together two kinds of cattle;
  You shall not sow your field with two kinds of seed,
  You shall not wear a garment upon you of two kinds of material mixed together.

  Furthermore, when you enter the land and plant trees for food, their fruit is forbidden for three years.
  On the fourth year, the fruit is holy.
  On the fifth, its fruit may be eaten.

  Also an emphasis on avoiding spirit witchcraft and lewdness: both are harlotry.
  No offering child sacrafices to Molech.
  Generally, no turning to anything but God for sactification.

  Then sexual impurity logic of incest is explained:
  One who lies with his fathers wife has adulterated his father.
  One who lies with his child's spouse has adulterated the child.

  Two who are joined together are treated as one; adulterating one of the two adulterates them both.
  When one person adulterates either his parent's or child's spouse, he adulterates them both, (and by this logic three are now joined, hypothetically).
  Incest applies to son or daughter in-laws, extending beyond blood related bonds.
  But it seems that a parent and child are not to be sexually joined this way, even by proxy.
  The punishment for this type of sexual sin is death - the immediate destruction of the joined flesh.

  The punishment for similar sexual sins (like adulterating uncle's wife or a sister or brother) is also serious but not as severe.
  Moreover, one shall not marry a woman and her mother; the three united also join a mother and child (the punishment is burning by fire).
  So there is a special emphasis that a parent and child are not to be sexually joined.
  
  Then are regulations for priests: Who may touch a dead body, and the stricter regulations involving who may be taken as a wife and who may enter the veil.
  
  <h1>Leviticus 22-24</h1>
  More details on who can eat the holy gifts (food) for the priests.
  Details on the animals sacraficed to the Lord; They are to be choice male animals having no defect, and a mother and young are not to be slaughtered simultaneously.

  Then there are lots of dates marking significant events: Passover, various feasts, and dedicated days.
  A lot of days, usually the first and last of 7 days of some holiday are Holy convocations.
  A lot of these dates are also sabbaths, on which no laborious work is to be done.
  On some holidays no work is to be done at all.
  And the general point of all these days is to remember the events of God bringing Israel out of Egypt in a ritualistic manner.

  Then are instructions for Aaron's line keeping a golden lamp continually burning and preparing cakes for the Lord.
  Those who curse or blaspheme the Lord are to be stoned, including outsiders.
  Then for any man who injures or inflicts his neighbor, the same shall be done to him.
  But the one who kills an animal makes it good, life for life.
  
  <h1>Leviticus 25-27</h1>
  The seventh year is sabbath, the sixth year will bring forth crops for three years, so there can be no sowing or gathering on the sabbath year. 
  The fiftieth year is consecrated jubilee, a release year for any slaves.

  The land shall not be sold permanently, for the land is the Lord's. So if one has to sell his land, his nearest kinsment must buy it back.
  Or the original seller must buy it back.
  Or if he can't, then he will get the land back at the year or jubilee.
  The same goes for a dwelling house in a walled city, but the redemption right is only valid for a year. Beyond the year, the house does not revert back at the jubilee.
  Other village houses don't have this restriction.

  Also Israelites are to look out for one another, treat each other with dignity, and give each other discounts.
  But aliens and their children may be taken as slaves indefinetley, not being freed at the jubilee.

  Then blessings of the convenant are reiterated. And then, many punishments (which include the opposite to the blessings) are listed that will happen if Israel does not obey God and turns to idols.
  Then more punishments are listed, that will happen if Israel still does not turn to God.
  Then more punishments are listed, that will happen if Israel still does not turn to God.

  Then some confusing logic about valuation.
  Things are valuated by priests, things can be consecrated, made holy, and redeemed or not redeemable.
  Anything set apart to the Lord shall not be sold or redeemed, but shall be completely devoted (to destruction) and is most holy.
  The set apart people (or devoted to destruction) may not be ransomed, but shall be put to death. (? may be mistranslating verse, idk).
  The tenth of anything belongs to the Lord and is holy; It shall not be replaced or substituted, but if it is, both the original and substitute are holy.
  
  <h1>Numbers 1-3</h1>
  It is now year 2 of being in the wilderness.

  Moses did a census and split the tribes with their leaders.
  All the tribes except Levites had ~40,000-60,000 men able to go to war (aged 20+).
  Totalling 603,550 men.
  Levites were not counted in the census; Their job was moving the tabernacle and settling near it.

  God decided which tribe shall be to which side of the tabernacle. 
  Generally, a few (~3) tribes were clustered together on one side to form a supergroup military unit.
  Notably, Judah was on the east side, with the largest military power.
  
  God said he took the Levites from the sons of Israel instead of every firstborn, and he sanctified to himself every firstborn of man and beast in Israel the same day God struck down all firstborn in Egypt.
  So it seems, based on the previous logic in Leviticus about redeeming the firstborn with an offering, that God used the Egyptians as an offering to redeem the Israelites, firstborn for firstborn.

  There are genealogies of Moses and Aaron, and the Levites. The Levites were organized by family line (or mini-tribe?) and each was ordered to camp on one side of the tabernacle and had specific responsibilities for the tabernacle.
  Then God commanded Moses to take the Levites (instead of all the firstborn of Israel), and the cattle of the Levites instead of all the firstborn cattle of Israel.
  And the Levites belonged to God, and were presumably the redemption for the firstborns of Israel.
  There were 22,000 Levites and 22,273 firstborns. The remaining 273 were redeemed for 5 shekels each, paid to Aaron's line.
  
  <h1>Numbers 4-6</h1>
  Description for how the tabernacle (and contents) were to be covered during transportation, typically by a purpoise skin or blue cloth
  Then another census for all the tribes of the Levites.

  Then the law of jealousy- what happens when a woman cheats or is suspected of cheating, is a priest curses her with bitter water, which she drinks.
  If she cheats, then a curse takes effect. If she didn't cheat, the curse is void.

  Then separation laws of the Nazarite are explained. 
  A Nazarite is a person who takes a vow to abstain from wine, grapes, and cutting their hair for a period of time, as a vow of dedication to God.
  If they break the vow, they must offer sacrifices to the Lord and shave their head.

  Then God tells Moses what blessings Aaron and his sons are to say upon the Israelites. And when they say it, God will bless Israel.

  <h1>Numbers 7-9</h1>
  All the leaders of the tribes of Israel offered their offerings of their tribe, one each day.
  I think each of them offered the same thing:
  - one silver plate weighing 130 shekels (which is also their currency I think), filled with fine flour mixed with oil
  - one silver bowl weighing 70 shekels, filled with oil
  - one gold pan weighing 10 shekels, filled with incense

  - one bull, ram, male lamb for burnt offering
  - one male goat for sin offering
  - two oxen, five rams, five male goats, five male lambs for the peace offering.

  Then Moses lit the 7 lampstands and prepared the Levites.
  The Levites had offerings of animals to be atoned for, but the Levites themselves were a wave offering to the Lord.
  The Levites also had to clean themselves, wash their clothes, and shave their whole body.
  This qualified them for their service.
  The Levites are to start work at 25 and retire at 50, at which they may assist their brothers but do no work.

  Then it came time to observe the Passover. Some were unclean because they had touched a dead body and appealed to Moses to observe the Passover.
  God let them observe the Passover still one month later, on the 14th day of the second month (the original Passover is 14th of first month).
  God also said any who are clean and fail to observe the Passover shall be cut off from the people.
  Aliens and sojourners are also allowed to observe the Passover.

  God then lead the Israelites again by cloud by day and fire by night. He lingered over the tabernacle when it was time to settle, and lifted the cloud when it was time to set out.
  
  