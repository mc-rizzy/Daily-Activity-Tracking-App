title: "Week 8: Numbers 10 - Numbers 27"
date: "July 3, 2026"
week: 8
description: "Setting out for promised land"
overview: |
  The people set out for the promised land, but there is trouble and complaining on the way.
notes: |
  <h1>Numbers 10 - 12:</h1>
  Trumpets are to be made that can be used to call together leaders, the congregation, to signal the start of a journey, and for God's rememberance of Israel during offerings.
  These trumpets are symbolic of God remembering Israel and saving them from their enemies.
  The order in which the tribes and armies set out was listed.
  Hobab of Reuel, Moses' father-in-law, almost went back to his relatives, but Moses said if he comes whatever good the Lord does to them, they will do for him.
  So Hobab went with Moses too.

  They people were still having the manna, which set for them daily. Anyways, the people complained again (about the lack of meat) and reminisced over being in Egypt.
  Moses felt insufficient to lead the people and asked for death. Then he gathered 70 elders and God made them prophesy, just this once.
  God was angry and Moses said they will eat meat for a month until they are tired of it, and God brought quail from the sea and sent a plague on Israel (upon those who were greedy).

  Mirian and Aaron spoke against Moses for marrying a Cushite woman. 
  (It's noted that Moses is the most humble man on Earth atm)
  God was angry, called Miriam and Aaron out of the tent and met them as a pillar of cloud.
  He reality checked them by saying He speaks with Moses face to face, but speaks with others in dreams.
  He gave Miriam lepersy and Aaron begged Moses, and Moses begged God to heal her.
  God said let her endure her punishment for 7 days and then she shall be healed.

  <h1>Numbers 13 - 15:</h1>
  Moses sent out 12 spies to scout Canaan, one from each tribe.
  It's also noted here that Moses called Hoshea of Nun "Joshua".
  So the spies spied for 40 days and found the land was bountiful, the the Amalek and descendants of Anak lived there (giants and nephilim).
  So Caleb said they should go take the land "Trust, it's fine" and all the other spies said the land devours its inhabitants.
  The hebrew translation of land 'eres can mean both the physical land and the inhabitants of the land. So it probably means the Canaanites eat people.
  
  It's also noted that Amalek (in hebrew - "dweller in a valley", "grandson of Esau, progenitor of a tribe", and "descendants or tribe of Amalek") is living in the land of the Negev (south, or southern region of Judea),
  the Hittitites and Jebusites and Amorites live in the hill country (the hills or mountainous region),
  and the Canaanites live by the sea and the Jordan.
  So we see now what has become of Esau's line. 

  <blockquote class="border-l-2 border-zinc-500 pl-4 my-6 italic text-zinc-400">
  This block is hypothetical and based on reasoning, not pure scripture.

  It <i>seems</i> that the land resembles a city-state nation where each the regions are ranked in importance. Moses commands the spies to see the Negev first, and then the mountainous regions. So it seems the Negev is the fertile valley land, where the mountains are an environmental deterrent surrounding the capital region, and the land by the sea are like the farmers that live outside a typical walled city-state nation.
  Based on Numbers 35, it seems that standard cities are walled, with farmland or pasture-land outside the walls surrounding the city.

  So hypothetically, it would make sense the dominant ruling class are the Amalekites (probably the most %nephilim, or some high-rank class nephimilim), the Hittitites, jebusites, and Amorites are soldier class nephilim (lower class than the Amalek but big and strong), and the Canaanites are the farmers and laborers (the lowest %nephilim who are enslaved or work for the higher class nephilim). Canaanites may also generally mean people of Canaan. Numbers 14:25 says Canaanites are also in the valley, so it would make sense that the Canaanites are multiple of the three regions as an enslaved class that lives serving the higher classes.
  </blockquote>

  The people grumbled so hard, they said let's appoint a new leader to take us back to Egypt 😭
  Joshua and Caleb and the other spies tore their clothes, and they said the land was exceedingly good (They did not want to return to Egypt after seeing the land).
  The people wanted to stone them, and Moses begs God to pardon Israel, saying if God kills them all, the Egyptians will say God was not able to bring them to the promised land.
  God agrees to pardon them, but says he will do to Israel what they have grumbled in his hearing.
  So instead of stoning Caleb and Joshua, God will instead let the Israelites die in the wilderness for 40 years, a year for each spying day.
  The other spies who grumbled died by plague.
  Only Joshua and Caleb lived to enter the promised land, and the descendants of Caleb of Judah will take possesion of the land.

  When Moses told this to Israel, they mourned and instead said they will enter the land against Moses' warning.
  But as it was said, God did not let them succeed, and the Amalekites and Canaanites beat them further back.

  <b> Post-spy-stuff </b>
  The Israelites are to offer offerings to God upon entering Canaan. All sorts of offerings:
  Burnt, grain, drink, freewill offerings.
  Furthermore are instructions for offerings for those who sin unintentionally, and for "when" (not "if") Israel forgets to keep the law.
  And those who sin intentionally are to be cut off.

  <h1>Numbers 16 - 18:</h1>
  Korah (Levite, the line of priests) started a rebellion with Dathan and Abiram, and 250 leaders. They argued with Moses and Aaron, claiming the congregation is holy and that Moses had lead them out for nothing,
  as they have no inheritance from the promised land. They also acused them of being hypocrites who lord their superiority over Israel.
  Moses said let all of the rebellion bring their bronze censers before the Lord, and the next morning God will reveal who is holy.
  The next morning, while Moses was near the congregation, God said "step away from them so that I can kill/consume them instantly".
  the congregation cried out to God, asking if he will kill them all for the sins of one man (as an example. In this case, it is ~250 men).
  God chilled out and said everyone step away from Korah and Dathan and Abiram, their family and dwelling. Then the ground swallowed up Korah and Dathan and Abiram and all their possesions and family,
  and they went into Sheol alive. Fire came forth from God and consumed the 250 men offering incesnse.

  Their censers were made into bronze sheet plates for the altar, to remind every layman who is not of the line of Aaron that they should not come near the altar to burn incense to God,
  as God appointed specific people who are allowed to come near to him (priests and Moses), and that not everyone can come near to him.

  Later the congregation blamed Moses for the death of the rebellion. God became furious again, his cloud came upon the tent of meeting where Moses and Aaron was,
  and said again to Moses "Get away from this congregation that I may consume them instantly". 
  As God began striking down the people with a plague, Moses sent Aaron out into the crowd to burn offerigns and make atonement for Israel, standing between the dead and living.
  Total losses from the plague were 14,700.

  Then God tells Moses to collect a rod from the household of each tribe (representing the leader of that tribe. The rod has the leader's name on it), and the tribe of Levites altogether shall give 1 rod for Aaron instead of a rod for each tribe of the Levites.
  God said the leader whom he choses, his rod will blossom.
  Aaron's rod blossomed, and all the leaders came to see it, and Aaron's rod was kept for all to see as a symbol of who God chose. The rest of the rods were returned.
  God said this was to lessen the grumbling of Israel. Probably to stop them from accusing Moses and Aaron of being tyrants doing whatever they want.
  This way, it's clear God chose Moses and Aaron to lead, and their commands are from God.

  God tells Aaron that he and his sons shall bear the guilt in connection with the sanctuary, and in connection with the priesthood.
  Aaron's line is to manage the sanctuary and altar, allowed to go behind the veil, and the Levites shall tend to the tent of meeting.
  If the Levites come near the sanctuary and altar, both they and the priests of Aaron's line will die.

  Then God explains which of the previous commandments or laws the priests shall follow, and which work differently for them.
  Some stuff is repeated, like redeeming and valuations. Other stuff is different: priests shall not own land, for they are dedicated to God, who gives them their inheritance.
  And the most holy things: The first fruits and most holy gifts reserved from fire of offerings, are given to Aaron's line of priests.

  For the Levites: Their inheritance is the tithe of Israel and various parts of offerings as explained previously.
  However, the priests are still to tithe to God- A tithe of tithe, which they give to Aaron I think.

  So it seems their is a parallel between the Tabernacle and the people of Israel: The outer area, the holy, and the most holy.
  The congregation (offer burnt offerings and holy things), the Levites (which offer the most holy things out of those holy things), and Aaron's line (who receives the most holy things and has their inheritance from God alone).
  
  <h1>Numbers 19 - 21:</h1>
  Details the offering of a red heifer, whose blood is to be sprinkled around the camp and burnt with cedar wood and hyssop and scarlet material.
  The ashes are used for a purification water, to be sprinkled on those who touch the dead.
  Those who touch the dead are (unclean for 7 days and) to be sprinkled with this on the third and seventh day.
  However, anyone who touches anything relating to the red heifer for the offering, or even the purification water, is unclean until evening and should bathe.
  So it would seem this is an analogy for Jesus Christ, who is used for purification, but became unclean in the process.

  Israel complained about the lack of water, and God told Moses and Aarson to take the rod, and speak to the rock so it yields water.
  But Moses and Aaron spoke and struck the rock with the rod, and it produced the waters of Meribah.
  So God said they did not treat him as holy, and because of that Aaron will not enter the land. 
  Moses sent messengers to the king of Edom, to ask to pass through their land.
  The king refused twice and brought out a strong force, so Israel left and went to mount Hor.
  Aaron went up mount Hor with Moses and his son Eleazar, and his garments and duties were transferred to Eleazar, and Aaron died.

  Then God helped Israel conquer Arad in Canaan after they cried out to him.
  Then Israel complained about food and water, and God sent bronze serpents to bite everybody, and people began to die.
  Moses intereded and God said to make one of the serpents on a standard (or a staff of some sort presumably) and everyone who was bitten who looks at the serpent on the rod will live.
  Then is a section that explains the layout of the land, where Israel journeyed along. Also, God gave Israel water at a well in one of these regions.
  And God apparently has a" Book of Wars of the Lord".

  Then Israel asked Sihon, king of the Amorites to pass through the land. Sihon said no and brought out his forces.
  Israel defeated Sihon and conquered all the land of the Amorites.
  Israel traveled further to battle king Og of Bashan at Edrei, and the same happened.
  
  
  <h1>Numbers 22 - 24:</h1>
  Balak, king of Moab (neighboring Amorites) saw that Israel has come out of Egypt, multiplied a lot, and taken over the land of the Amorites.
  They are across from the land of Moab, and it is clear they are a procreating force that conquers the land and spreads across it.
  So Balak sent for Balaam, to pay him to curse Israel (as it seemed plainly fighting Israel like the Amorites was not enough).
  Balaam spoke then to God, asking God to curse Israel. God said nah, instead Israel is blessed.
  So God made his will clear. But the king persisted, sending more high ranking officials. So at last, God said if they come, you may go with them. But you shall only do what I tell you.
  And so Balaam eventually went with the officials. On the way, his donkey saw an angel, for though God gave Balaam the OK to go, God was still angry with Balaam for going.
  So the donkey went out of the way into the field. Balaam struck his donkey and went back on path.
  The donkey was about to go into the angel, so it veered and rammed Balaam's foot into a side wall or something.
  Balaam was angry and struck the donkey.
  The donkey didnt want to go into the angel, so it lay down. Balaam was angry and struck the donkey.
  Three times Balaam struck the donkey, and God opened the eyes of Balaam to the angel and the mouth of the donkey.
  The donkey pleaded with Balaam, and Balaam bowed down, asked for forgiveness, and asked if he shall turn back.
  The angel said dont turn back, but say only what I tell you.
  So Balaam came to the land of Moab, and Balak brought him to the high places of Baal.

  Balaam told Balak to set up 7 altars, and sacrafice a bull and ram on each.
  Balaam then went away to God, who gave him a Word.
  Balaam came back and glazed God and Israel, and Balak was mad because Balaam instead blessed Israel rather than curse them.
  So Balak took Balaam to the edge of Israel, and said curse them from there (because he thought God refused to curse Israel because the previous location was disagreeable).
  Again Balaam told Balak to set up 7 altars and sacrafice a bull and ram on each.
  Balak went away to God, came back, and then glazed God and Israel again, speaking about the unstoppable and chosen force that is Israel.
  Balaam again tried another location overseeing a wasteland. Again, 7 altars, 7 bulls, 7 rams.

  The Spirit of the Lord came upon Balaam, and again he glazed Israel and God.
  So Balak was upset that Balaam blessed Israel 3 times. 
  And he was about to send him away, but Balaam then told Balak what would become of Moab, and all others who are in the way of Israel.
  Basically, a bunch of other peoples, Kenites, Asshur, etc. will suffer utter and inevitable destruction along with Moab.

  <blockquote class="border-l-2 border-zinc-500 pl-4 my-6 italic text-zinc-400">
  Prevously it was instructed to Israel, the initial fruits are not to be eaten when entering a new land, they are for God. On the third year, they become holy. They bear the first fruits, which belong to God. The fourth year, Israel may eat.

  The seventh day of creation marks completion.

  So here Balaam offered burnt offerings to God:
  7 bulls, 7 rams, on 7 altars.
  3 times repeated.
  Then, on the third time, Balaam did not just receive a word from God, but the Spirit of the Lord came upon Balaam.
  
  Traditionally, God Triune is observed as God the Father, God the Son, and God the Holy Spirit. So symbols of completion are combined with symbols of holiness. At the completion of this <i>holiness</i> ritual, Balaam experiences the spirit. The third counterpart: the Holy Spirit, came at Pentecost: People no longer needed Levite priests to intercede, Jesus interceded. As a result, the presence of God can be given directly to people in the form of the Holy Spirit.
  Food for thought.
  </blockquote>
  <blockquote class="border-l-2 border-zinc-500 pl-4 my-6 italic text-zinc-400">
  Balaam - meaning "Perhaps".
  Is also mentioned in Jude. Although it seems Balaam made no obvious errors in this chapter, he is referred to as one who strayed from God or errored. As to be expected, all the Canaanites at this time were called out for many debaucherous sins. And it seems Balaam is known for divination, or cursing people, perhaps the reasoning for his error is that his heart was not fully surrendered to God.

  Also, the land of Pethor in which Balaam ruled was also referred to as Mesopotamia, so the promised land may have been the fertile region of ancient Mesopotamia.
  </blockquote>

  <h1>Numbers 25 - 27:</h1>
  Israel played harlot with the daughters of Moab, resulting in idol worship (like Baal), idol sacrafices, and corruption.
  God told Moses to execute all the leaders of Israel (like a sacrafice, for the idol sacrafices). Moses told the judges to execute everyone who joined themselve to Baal.
  Phineas (of Aaron's line), at the tent of meeting, saw a man who brought a Midianite woman whilst this was happening, and killed them both by spear.
  Because of his jealousy for God, God's plague (another one) was curbed and God's jealousy did not destroy all of Israel, and God gave him his covenant of peace.
  Plague deaths were 24,000.
  God commanded Moses to be hostile to the Midianites and strike them.

  God told Moses to take another census from all the tribes (of those who could fight).
  The land to be taken shall be divided for inheritance between all the tribes, except Levites.
  The size of the land given to each tribe shall be proportional to the population count of the tribe.
  Total numbers were 601,730.

  Then some daughters came to Moses whose father had no son.
  God said for daughters who have no brother, their fathers inheritance shall be transferred to them, and they shall receive a hereditary possession from among their fathers brothers.
  If a man has no children, his inheritance is transferred to his brothers. If no brothers, then the nearest family relative.
  The God instructed Moses to appoint Joshua as leader to succeed Moses before Israel and Eleazar.
  
  