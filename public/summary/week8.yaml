  <h1>Numbers 10 - 12:</h1>
  Trumpets are to be made that can be used to call together leaders, the congregation, to signal the start of a journey, and for God's rememberance of Israel during offerings.
  These trumpets are symbolic of God remembering Israel and saving them from their enemies.
  The order in which the tribes and armies set out was listed.
  Hobab of Reuel, Moses' father-in-law, almost went back to his relatives, but Moses said if he comes whatever good the Lord does to them, they will do for him.
  So Hobab went with Moses too.

  They people were still having the manna, which set for them daily. Anyways, the people complained again (about the lack of meat) and reminisced over being in Egypt.
  Moses felt insufficient to lead the people and asked for death. Then he gathered 70 elders and God made them prophesy, just this once.
  God was angry and Moses said they will eat meat for a month until they are tired of it, and God brought quail from the sea and sent a plague on Israel (upon those who were greedy).

  Mirian and Aaron spoke against Moses for marrying a Cushite woman. 
  (It's noted that Moses is the most humble man on Earth atm)
  God was angry, called Miriam and Aaron out of the tent and met them as a pillar of cloud.
  He reality checked them by saying He speaks with Moses face to face, but speaks with others in dreams.
  He gave Miriam lepersy and Aaron begged Moses, and Moses begged God to heal her.
  God said let her endure her punishment for 7 days and then she shall be healed.

  <h1>Numbers 13 - 15:</h1>
  Moses sent out 12 spies to scout Canaan, one from each tribe.
  It's also noted here that Moses called Hoshea of Nun "Joshua".
  So the spies spied for 40 days and found the land was bountiful, the the Amalek and descendants of Anak lived there (giants and nephilim).
  So Caleb said they should go take the land "Trust, it's fine" and all the other spies said the land devours its inhabitants.
  The hebrew translation of land 'eres can mean both the physical land and the inhabitants of the land. So it probably means the Canaanites eat people.
  
  It's also noted that Amalek (in hebrew - "dweller in a valley", "grandson of Esau, progenitor of a tribe", and "descendants or tribe of Amalek") is living in the land of the Negev (south, or southern region of Judea),
  the Hittitites and Jebusites and Amorites live in the hill country (the hills or mountainous region),
  and the Canaanites live by the sea and the Jordan.
  So we see now what has become of Esau's line. 

  <blockquote class="border-l-2 border-zinc-500 pl-4 my-6 italic text-zinc-400">
  This block is hypothetical and based on reasoning, not pure scripture.

  It <i>seems</i> that the land resembles a city-state nation where each the regions are ranked in importance.
  Moses commands the spies to see the Negev first, and then the mountainous regions. So it seems the Negev is the fertile valley land, where the mountains are an environmental deterrent surrounding the capital region, 
  and the land by the sea are like the farmers that live outside a typical walled city-state nation.
  
  So hypothetically, it would make sense the dominant ruling class are the Amalekites (probably the most %nephilim, or some high-rank class nephimilim),
  the Hittitites, jebusites, and Amorites are soldier class nephilim (lower class than the Amalek but big and strong),
  and the Canaanites are the farmers and laborers (the lowest %nephilim who are enslaved or work for the higher class nephilim).
  Canaanites may also generally mean people of Canaan.
  Numbers 14:25 says Canaanites are also in the valley, so it would make sense that the Canaanites are multiple of the three regions as an enslaved class that lives serving the higher classes.
  </blockquote>

  The people grumbled so hard, they said let's appoint a new leader to take us back to Egypt 😭
  Joshua and Caleb and the other spies tore their clothes, and they said the land was exceedingly good (They did not want to return to Egypt after seeing the land).
  The people wanted to stone them, and Moses begs God to pardon Israel, saying if God kills them all, the Egyptians will say God was not able to bring them to the promised land.
  God agrees to pardon them, but says he will do to Israel what they have grumbled in his hearing.
  So instead of stoning Caleb and Joshua, God will instead let the Israelites die in the wilderness for 40 years, a year for each spying day.
  The other spies who grumbled died by plague.
  Only Joshua and Caleb lived to enter the promised land, and the descendants of Caleb of Judah will take possesion of the land.

  When Moses told this to Israel, they mourned and instead said they will enter the land against Moses' warning.
  But as it was said, God did not let them succeed, and the Amalekites and Canaanites beat them further back.
  
