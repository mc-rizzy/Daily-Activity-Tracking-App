overview: |
  Starts with Joseph
  Although Jacob is renamed Israel, in some parts he is called Jacob and other parts he is called Israel.
  Probably symbolic of something, idk.
notes: |
  Gen 37
  Joseph is favored by his father, Jacob, who gives him a special robe. Joseph also shares dreams that suggest he will one day rule over his family, causing his brothers to become jealous.
  Joseph's brothers plot against him when he comes to visit them. Instead of killing him, they throw him into a pit and later sell him to traveling traders on their way to Egypt.
  The brothers deceive Jacob by showing him Joseph's blood-stained robe, leading Jacob to believe that Joseph has been killed by a wild animal. Meanwhile, Joseph is taken to Egypt and sold into the household of Potiphar, setting the stage for the events that follow.

  Gen 38
  Judah leaves his brothers and marries a Canaanite woman. His eldest son, Er, is wicked and dies. His second son, Onan, refuses to fulfill his family duty to provide offspring for his deceased brother's line and is also judged by God.
  Judah promises his youngest son, Shelah, to his widowed daughter-in-law, Tamar, but does not keep his promise. Tamar realizes she has been denied justice and takes matters into her own hands.
  Disguising herself, Tamar encounters Judah and becomes pregnant by him. When Judah later learns she is expecting, he initially condemns her, but after discovering that he is the father Tamar gives birth to twins, Perez and Zerah, and Perez becomes part of the family line that eventually leads to King David and Jesus Christ.

  Gen 39
  After being sold into Egypt, Joseph becomes a servant in the house of Potiphar. The Lord is with Joseph, causing everything he does to prosper, and Potiphar places him in charge of his entire household.
  Potiphar's wife repeatedly tries to seduce Joseph, but he refuses out of loyalty to both Potiphar and God. When Joseph flees from her advances, she falsely accuses him of attempting to assault her.
  Joseph is thrown into prison because of the false accusation. Even in prison, however, the Lord remains with him, granting him favor with the prison warden and placing him in a position of responsibility over the other prisoners.

  Gen 40
  While in prison, Joseph meets Pharaoh's Cupbearer and Pharaoh's Baker, who are troubled by their dreams.
  Joseph interprets their dreams through God's wisdom: the cupbearer will be restored to his position, while the baker will be executed.
  The interpretations come true exactly as Joseph said. Joseph asks the cupbearer to remember him, but the cupbearer forgets him.

  THEME_ God is at work even tho it doesnt seem like it, having faith in tough/hard times


  Gen 41
  Pharaoh has troubling dreams about cows and grain that no one can interpret. The cupbearer remembers Joseph and recommends him.
  Joseph explains that God revealed seven years of abundance followed by seven years of severe famine. He advises Pharaoh to store food during the good years.
  Pharaoh puts Joseph in charge of Egypt, making him second only to Pharaoh. Joseph prepares the nation, and food is stored before the famine begins.

  Gen 42
  Because of the famine, Jacob sends Joseph's brothers to Egypt to buy grain, but keeps Benjamin at home.
  Joseph recognizes his brothers, but they do not recognize him. He accuses them of being spies and tests them by imprisoning Simeon and demanding that they return with Benjamin.
  The brothers begin to feel guilty about how they treated Joseph years earlier. They return home with grain and discover their money has been returned in their sacks.

  Gen 43
  When the food runs out, Judah persuades Jacob to let Benjamin go to Egypt so they can buy more grain and free Simeon.
  Joseph sees Benjamin and is deeply moved. He welcomes his brothers, releases Simeon, and prepares a feast for them.
  Joseph secretly gives Benjamin a much larger portion of food, continuing to test his brothers' character and their treatment of Benjamin.

  Gen 44
  Joseph secretly places his silver cup in Benjamin's sack and sends his brothers on their way.
  The brothers are stopped, the cup is found in Benjamin's sack, and they are brought back to Egypt. Joseph declares that Benjamin must remain as his servant.
  Judah pleads for Benjamin's freedom and offers himself in Benjamin's place, showing that the brothers have changed from the men who once sold Joseph.

  Gen 45
  Joseph reveals his identity to his brothers and forgives them, telling them that God used their actions for a greater purpose.
  Joseph explains that God sent him ahead to Egypt to preserve lives during the famine.
  Joseph invites Jacob and the entire family to live in Egypt. Jacob is overjoyed to learn that Joseph is still alive.

  Gen 46
  Jacob travels to Egypt with his entire family after God reassures him in a vision that He will make his descendants into a great nation there.
  Jacob and Joseph are reunited after many years, and they embrace with great joy.
  Joseph settles his family in the region of Goshen, where they can live and care for their livestock.
  Gen 47
  Joseph presents his family to Pharaoh, who allows them to settle in the fertile land of Goshen.
  During the famine, Joseph manages Egypt's food supply. The people exchange their money, livestock, land, and labor for food, strengthening Pharaoh's control over the land.
  As Jacob nears death, he asks Joseph to promise that he will bury him in the family burial place in Canaan, not in Egypt.

  Gen 48
  As Jacob nears death, he adopts Ephraim and Manasseh as his own sons, giving Joseph a double inheritance among the tribes of Israel.
  When blessing the boys, Jacob crosses his hands and gives the greater blessing to Ephraim, the younger son, instead of Manasseh, the older.
  Jacob explains that this is God's choice and prophesies that Ephraim will become greater than Manasseh.

  Gen 49
  Jacob gathers his twelve sons and gives each a prophetic blessing concerning their future tribes.
  The most significant blessing is given to Judah, whose descendants will hold leadership and kingship. This points forward to King David and ultimately Jesus Christ.
  After blessing his sons, Jacob dies and instructs them to bury him in the family tomb in Canaan.

  Gen 50
  After Jacob dies, Joseph honors his father's wishes by burying him in Canaan.
  Joseph's brothers fear that he will seek revenge, but Joseph forgives them and reassures them of his care.
  God's providence throughout his life. Joseph later dies in Egypt, trusting that God will one day bring Israel back to the Promised Land.

  Exo 1
  The descendants of Jacob multiply greatly in Egypt, becoming a large and powerful people.
  A new Pharaoh fears the Israelites and enslaves them, forcing them into hard labor.
  Pharaoh orders the Hebrew baby boys to be killed, but the Hebrew midwives fear God and refuse to obey.

  Exo 2
  Moses is born during Pharaoh's order to kill Hebrew baby boys. His mother hides him in a basket on the Nile, and Pharaoh's daughter finds and adopts him.
  As an adult, Moses kills an Egyptian who is beating a Hebrew slave. When Pharaoh learns of it, Moses flees to the land of Midian.
  In Midian, Moses marries and becomes a shepherd. Meanwhile, the Israelites cry out because of their slavery, and God hears their prayers.


  Exo 3
  While tending sheep, Moses encounters God in a burning bush that is not consumed by fire.
  God tells Moses that He has heard the cries of the Israelites and calls Moses to lead them out of Egypt.
  When Moses asks God's name, God replies, "I AM WHO I AM," and instructs Moses to tell Israel that God has sent him.

  Exo 4
  Moses doubts his ability to lead, so God gives him miraculous signs, including turning his staff into a snake.
  Moses says he is not a good speaker, but God promises to help him and appoints Aaron to speak on his behalf.
  Moses returns to Egypt with Aaron, and they tell the Israelites that God has come to deliver them. The people believe and worship God.




