title: "Week 6: Leviticus 1-18"
date: "Jun 22, 2026"
week: 6
description: "Idk"
overview: |
  The stuff that happens after Moses and the Israelites get out of Egypt
notes: |
  ===== Lev. 1-3 =====:
  Detailed instructions for burnt offerings,
  grain offerings,
  peace offerings.
  Blood and fat are not to be consumed; they belong to the Lord.
  
  ===== Lev 4-6 =====:
  Instructions for sin offerings (of people, of the entire nation, and of leaders).
  Instructions for guilt offerings, which include sins that a person committed whilst unaware of the sin, and later realized it was a sin.
  These are ordered by what can be afforded. A choice ram, or two turtledoves (if can't afford lamb), or grain offering (if can't afford turtledoves).  

  When something is stolen or cheated, it shall be returned in 6/5 (fully and then 1/5 of it).
  Then instructions of the role of the priests, Aaron's line, and what they were to do with the offerings.

  ===== Lev 7-9 =====:
  The guilt offering is the most holy. The priests can be fed by the offerings as well.
  Whichever priest atones with the offering can eat of it (to my understanding).
  Usually the thigh or breast can be eaten, but not the fat.

  Usually the flesh shall be eaten on the same day of burining, and in some instances, on the day after also, but never on the third day.
  God instructs Moses to do a sacrafice for Aaron and his sons to consecrate them, and afterwards they are ordained through seven days.
  Aaron and the people of Israel do another similar offering for atonement.
  Fire came out from the presence of the Lord and burned the offering
  
  ===== Lev 10-12 =====:
  Aaron's sons, Nadab and Abihu, offered a "strange" offering to the Lord, which was not commanded.
  God consumed them with fire, and their bodies were carried away.
  God and Moses reiterated some details about how the sacrafices were to be carried out.
  Aaron's sons were allowed to eat certain parts of the offering, for it is their heavenly due.
  However, on this day they did not eat it after the events that occurred, in fear of the Lord.

  Which animals are clean and unclean by categories.
  What becomes unclean (usually until evening) if touched by the animal.

  When a woman bears a son she is unclean for a week, and her menstruation.
  Then she shall remain in the blood of her purification for 33 days and not touch anything consecrated or go in the sanctuary.
  The durations are doubled for a female child.

  Then she shall bring a sin and burnt offering to the doorway of the tent of meeting, to a priest.
  And the priest shall offer it to the Lord and make atonement for her, and she shall be cleansed from the flow of her blood, and she will be clean.
  
  ===== Lev 13-15 =====:
  Specific symptoms and cases of leprosy, containment, treatment, and pronouncing clean or unclean.
  Instructions for offerings and atonement after treatment of leprosy, involving sprinkling of blood.
  Similar details and procedures are in place for the event that a house is infected with leprosy.
  If the leprosy still spreads after the house is quarantined and measures have been taken to stop the spread, the house is to be destroyed and removed.

  Then more details describing uncleanliness of discharges. Both of men and women, including sexual acts and menstruation.
  Both are to make offering and atone afterwards.

  ===== Lev 16-18 =====:
  After Aaron's sons died, Aaron was not to enter the holy place yet.
  An offering was to be made to atone for Aaron's household and for Israel, and also for the holy place (it has been desecrated by Aaron's sons, to my understanding).
  A scapegoat was to be led out, and Aaron and the one who released the scapegoat are to cleanse themselves.
  This is to be repeated once a year, and the tenth day of the seventh month is to be a sabbath when Israel shall be humble, and no work shall be done.

  Anyone who slaughters an ox or goat or lamb shall bring it to the door of the tent of meeting to offer it to God.
  17:7 - "No longer shall they sacrafice to the goat demons with thich they play the harlot."
  Neither is anyone to eat the blood of animals, but to pour out the blood and cover it with earth.
  For the blood is the life of all flesh.
  The consequence for either of these is to be cut off from the people.

  Eating a beast that is already dead or torn by other beasts is unclean.
  An array of situations in which you should not have ssexual relations, including
  when two are of the same blood, or close relatives in the family tree (even if not by blood).
  
  No one should attempt to have relations upwards in their family tree, nor downwards,
  Including with a woman and any of her offspring or her offspring's offspring (and also roles reversed),
  nor with neighbor's spouse, or anyone already married.
  
  A man should not marry two sisters simultaneously alive, for they are rivals.
  A man should not have sexual relations with a woman in her menstrual period.

  Also no gay, no bestiality, no offering children to Molech.
  So there is a long list of adultery and perversion that has defiled both Egypt and Canaan.
  They have defiled the land, which therefore "spewed" them out (probably by overpopulation).

  And God makes it clear, Israel is to adhere to God and keep his judgements, and not turn to any of these abominable customs.