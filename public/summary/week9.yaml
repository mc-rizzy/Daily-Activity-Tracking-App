notes: |
  <b>Numbers 28 - 30:</b>
  God talks about offerings, convocations, and sabbath again. Notably, offerings that are to be repeated, such as the continual offering, an twice-daily offering of male lamb (one in morning, one in evening), and most other offering types.
  It sounds really similar to before, but the details are slightly different.
  There are more offerings involving 7 of an animal this time. Similar to in Balaam's journey, for some offerings 7 of the same animal are to be sacraficed.

  Then a bunch of events are listed for the 7th month on the following days:
  1 (holy convocation, no labor), 10 (holy convocation), 15 (holy convocation), 2, 3, 4, 5, 6, 7, 8 (solemn assembly, no labor).
  Each of these days are listed with specific details for what to do. Typically, it involves sacraficing a specific amount of specific animals.
  The numbers of how many animals are to be sacraficed sometimes increment or decrement, and the numbers seem to mean something but I don't know what.

  If a man makes a vow to God or bind shimself with an oath, he may not violate his word.
  If a woman makes a vow, it depends. If her father forbids or her husband annuls the vow, God will not hold the vow against her.
  Otherwise, the woman may not violate her word.

  <b>Numbers 31 - 33:</b>
  God told Moses to take full vengeance on the Midianites. Moses send 12,000, 1,000 from each tribe to the war. Israel plundered Midian, all 5 kings, and some characters like Balaam.
  Moses was angry with the officers for sparing the women and children (for the women have previously led sons of Israel to trespass against the Lord, resulting in a plague). 
  Moses commanded them only to spare the virgin women. Kill the young sons and women who have known intimacy. Then Moses commanded anyone who touched a dead body to go outside the camp for 7 days, and purify themselves as described in previous chapters.

  Then is described how Moses took a portion out of the spoils of war for Eleazar's line and another portion for the Levites.
  All the rest is Israel's, but the chief officers also made offerings to God from the spoils of war (like gold and valuables), because they had no casualties. So Moses and Eleazar took those offerings.

  The sons of Gad and Reuben had lots of sheep, so when they passed by a suitable land (Gilead), they said let us settle down here and build cities for our sheep and children.
  Moses said they shouldn't ditch the rest of Israel mid-promised-land-crusade to settle down, and that the last time some Israelites didn't want to go to the promised land, God became very angry (during the revolt of the spies).
  The sons of Gad and Reuben said (paraphrased), "OK, we will go to war with Israel and not return until the promised land is claimed and Israel has crossed over to it. But let us make cities here for our sheep and children, so we may return after entering the promised land.""
  Moses said "OK, but don't go back on your word or God will see that you've sinned." Moses then said to Eleazar, Joshua, and the heads of the tribes: If the sons of Reuben and Gad follow through, they can have Gilead. But if not, they will have possesions in Canaan.
  Then is listed which regions that were previously and subsequently conquered and given to the sons of Gad, Reuben, and Manasseh; The names of the cities erected, their use, and who of them got what.

  Chapter 33 is a recap chapter: All the places which Israel traveled to are listed in order, and connected to major events, like Aaron's death.
  Then at the end, God gives a warning, saying Israel is to drive out the inhabitants from before them. Those who are not driven out will cause problems later, and as God plans to do to them, so God will do to Israel.
  
  <b>Numbers 34 - 36:</b>
  Then God described to Moses which regions are part of the promised land they shall conquer, and where its borders are.
  God appointed Eleazar, Joshua, and leaders from each tribe to do the apportioning of the land.
  Except for the tribes of Reuben, Gad, and the half-tribe of Manasseh, who have received their inheritance previously.

  God then described what cities and surrounding pasture land outside city walls are to be given to the Levites for their inheritance.
  God describes cities of refuge: A city that which someone who has killed a person may flee to while they wait for trial. 6 cities are to be cities of refuge, and given to the Levites: 3 cities of refuge across the Jordan, and 3 cities of refuge in Canaan.
  And 42 cities shall be given to the Levites in addition. So total, Levites get 48 cities.

  When someone kills someone, and the congregation rules that it was unintentional, then they may send the killer to a city of refuge, where the killer shall remain until the death of the high priest annointed with holy oil, upon which the killer may return to his land.
  The "blood avenger" (probably a blood-relative of the victim) may not go and kill him while he is in the city. But if the killer leaves the city, the avenger would not be charged guilty for killing the killer.
  However, if the killer is categorized a murderer, murderers may not give a ransom but are to be put to death (allegedly, in whichever city they go) by the blood avenger with multiple witnesses.
  It is written, Israel shall not pollute the land with bloodshed. There is no expiation for this bloodshed except the blood of the one who shed blood.
  
  <blockquote class="border-l-2 border-zinc-500 pl-4 my-6 italic text-zinc-400">
  There are a list of rules that categorize what is murder and what is unintentional killing, although the conditions for murder may be translated differently across versions. Some versions summarize to say that murder is intentional killing and unintentional is not murder.

  NASB: is murder if it satisfies one of the following
  - kills using iron or a stone
  - intentionally kills using wood
  - pushes someone out of hatred resulting in their death
  - laid in wait to throw something at someone, resulting in their daeth
  - struck someone out of emnity, resulting in their death
  </blockquote>

  Previously was written about the law of inheritance: if a father has no sons, the inheritance will go to the daughters. If no children at all, some blood relative, etc.
  Now it is inferred that the daughters of Zelophehad had no brother, so the inheritance goes to them. However, if they wish to marry to another tribe, then the inheritance will be revoked. For then the inheritance would pass to another tribe, and then return to the original tribe at the year of jubilee (another previous law).
  Moses then confirmed that God intended that no inheritance be passed among tribes, but each tribe (more or less, in accordance with the previous rules, try to) keep their inheritance.
  So Moses said no intermarrying between tribes. So the daughters of Zelophehad obeyed and married their cousins.

  <b>Deuteronomy 1 - 3:</b>
  Moses does a big recap from the first of their battles up to now: Gearing up to take the promised land. He tells what happens forwards, to the exile from the promised land, to what happens afterwards, and the lands they conquer.
  The line of Esau and of Lot are mentioned; God says Israel shall pass through certain lands but not conquer or take anything without paying for it because God has already decided it as the inheritance for Esau or Lot's line. Typically when this is mentioned, the land is previously inhabited by giants, and it seems that Lot or Esau's line had not yet conquered it, but will later.
  It seems God is still fulfilling his convenant with Lot and Esau, but it is unclear here whether they are still worshipping God. Esau previously married women from an idolatrous nation as an act of rebellion, which God warned would result in the corrupting of his line by idols. Not sure about Lot.
  Additionally, the names of the giant race: (Anakim / Rephaim / Emim / Zamzummim)
  
  However, Sihon did not let Israel pass through, so God delivered Sihon into Israel's hands and it was conquered. Similarly, Bashan brought out its forces and God delivered Bashan into Israel's hands and Israel conquered Bashan.
  The king of Bashan, Og, is said to be the last remnant of the Rephaim, and the size of his bedframe in cubits is 9 x 4. In feet, that is 13.5 x 6.
  There are then details of all the lands Israel conquered subsequently to make it to where they are now. 
  And Moses says that God was angry with him because of Israel; Moses begged God to let him enter the promised land, but God told him to go up on the mountain to look for himself (and give Joshua the charge), and to stop arguing with God about this matter.
  Poor Moses.
  
  <b>Deuteronomy 4 - 6:</b>
  Moses reminds Israel to keep God's teaching and statues, to not add nor take away from them. And Moses glazes God and warns Israel to keep his statutes generations past, not to turn to idols but to remember how God toook them out of Egypt.
  Moses repeats important commands from God from when they were at Mt. Horeb, including the ten commandments. Moses explains that God heard Israel's confirmation of obedience and God taught Moses more commands and statues to teach Israel later.
  Moses instructes Israel to keep following God, to have their hearts turned towards Him, that it would make them prosperous. And to not turn away from God, or God will bring judgement and punishment.

  <b>Deuteronomy 7 - 9:</b>
  God is clearing away nations before Israel, who shall utterly destroy them, and not intermarry or it will lead the sons of Israel to idols. And Israel is to destroy the idols and not liquidate them.
  And Israel is to have confidence in God, who will bring them prosperities and rain destruction on the enemies.
  Israel is to remember God and not turn to idols, or they will perish.

  Moses makes it clear God is not giving them prosperity because of their righteousness, but God is driving out the nations before them because of the wickedness of the nations. And God is giving Israel prosperity to fulfill the convenant made before them.
  And Moses repeatedly says Israel has been rebellious since the day he knew them, every day since they were brought out of Egypt.
  And Moses recounts all the times Israel did a big rebellion, such as at Mt. Horeb, when God wanted to destroy Israel and create a new nation from Moses.
  And when Israel was scared to invade the promised land. And Moses emphasized how he pleaded with God for forty days and nights (seemingly implying that Israel decided to make the golden idol not long after Moses left?)
  And Moses pleaded with God that if he destroyed Israel, Egypt would say that their God couldn't bring Israel to the promised land.
  
  